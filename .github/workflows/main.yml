name: python application CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  DOCKER_IMAGE: mp30/hyper-ops:${{ github.run_number }}

jobs:
  Checkout-code:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

# checkout
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

#python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # dependencies
      - name: Install Dependencies
        run: |
          uv sync --dev
      # ruff check
      - name: Ruff Check
        continue-on-error: true
        run: | 
          make ruff-check
      # unit tests
      - name: Create .env.test
        run: |
          echo "${{ secrets.TEST_ENV_FILE }}" > .env.test

      - name: Run Pytest
        run: | 
          make run-pytest
    # Docker login
      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
    # Build Docker Image

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE .

    # Dummy tests

      - name: Run Additional Tests
        run: | 
          echo "Running faltu tests..."

    # Push Docker Image
      - name: Push Docker Image
        run: | 
          docker push $DOCKER_IMAGE

  # Install Heroku CLI
      - name: Install Heroku CLI
        run: | 
          curl https://cli-assets.heroku.com/install.sh | sh

  # Heroku Verification
      - name: Verify Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
            heroku auth:whoami
            heroku apps
            heroku ps --app hyper-scale-ops-dev
            heroku buildpacks --app hyper-scale-ops-dev
          
  # Deploy on heroku
      - name: Deploy to heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
            git config user.name "GitHub Actions"
            git config user.email "github-actions@github.com"
            
            heroku git:remote --app hyper-scale-ops-dev
            
            git push heroku main:main --force

  # Debugging
      - name: Heroku Debug
        if: always()
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
            heroku ps --app hyper-scale-ops-dev

  # Upload Logs
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            .pytest_cache
            .coverage

  # Success Email
      - name: Success Email
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Success - Jenkins Python Pipeline
          to: learningonly092@gmail.com
          from: GitHub Actions
          body: FastAPI build and test succeeded on GitHub Actions!

  # Failure email
      - name: Failure email
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ALARM - GitHub Actions Failed
          to: learningonly092@gmail.com
          from: GitHub Actions
          body: FastAPI pipeline failed. Please check GitHub Actions logs.

  # slack notifications
      - name: Slack Success
        if: success()
        run: |
          curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":" SUCCESS: FastAPI build succeeded. Run #${{ github.run_number }}"}' \
          "${{ secrets.SLACK_WEBHOOK }}"

      - name: Slack Failure
        if: failure()
        run: |
          curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":" FAILURE: FastAPI build failed. Run #${{ github.run_number }}"}' \
          "${{ secrets.SLACK_WEBHOOK }}"