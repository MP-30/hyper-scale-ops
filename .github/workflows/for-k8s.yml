name: python application CI/CD
on:
  push:
    branches:
      - main
#  pull_request:
#    branches:
#      - main
env:
  DOCKER_IMAGE: mp30/hyper-ops:${{ github.run_number }}

jobs:
  Checkout-code:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

# checkout
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # dependencies
      - name: Install Dependencies
        run: |
          uv sync --dev
      # ruff check
      - name: Ruff Check
        continue-on-error: true
        run: | 
          make ruff-check
      # unit tests
      - name: Create .env.test
        run: |
          echo "${{ secrets.TEST_ENV_FILE }}" > .env.test

      - name: Run Pytest
        run: | 
          make run-pytest
    # Docker login
      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
    # Build Docker Image

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE .

    # Dummy tests

      - name: Run Additional Tests
        run: | 
          echo "Running faltu tests..."

    # Push Docker Image
      - name: Push Docker Image
        run: | 
          docker push $DOCKER_IMAGE



  # Success Email
      - name: Success Email
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Success - For-k8s Pipeline
          to: learningonly092@gmail.com
          from: GitHub Actions
          body: FastAPI build and docker push succeeded on GitHub Actions!

  # Failure email
      - name: Failure email
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ALARM - GitHub Actions For-k8s Pipeline Failed
          to: learningonly092@gmail.com
          from: GitHub Actions
          body: FastAPI pipeline For-k8s Pipeline failed. Please check GitHub Actions logs.

  # slack notifications
      - name: Slack Success
        if: success()
        run: |
          curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":" SUCCESS: FastAPI build For-k8s Pipeline succeeded. Run #${{ github.run_number }}"}' \
          "${{ secrets.SLACK_WEBHOOK }}"

      - name: Slack Failure
        if: failure()
        run: |
          curl -X POST \
          -H 'Content-type: application/json' \
          --data '{"text":" FAILURE: FastAPI build For-k8s Pipeline failed. Run #${{ github.run_number }}"}' \
          "${{ secrets.SLACK_WEBHOOK }}"