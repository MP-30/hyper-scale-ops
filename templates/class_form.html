{% extends "base.html" %}
{% block title %}Create Class{% endblock %}

{% block content %}
<div class="card">
    <h2>🏫 Create New Class Room</h2>
    <p class="text-muted">Set up a distinct grade layer or room division.</p>
    <div id="message-box" style="display: none; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-weight: bold;"></div>

    <form id="class-form">
        <div class="form-group">
            <label for="name">Class Name / Section</label>
            <input type="text" id="name" placeholder="e.g. Grade 10-A" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label for="level">Academic Year Level (Numeric)</label>
            <input type="number" id="level" min="1" max="12" placeholder="e.g. 10" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <button type="submit" class="btn" style="margin-top: 20px;">Create Class</button>
    </form>
</div>

<script>
document.getElementById('class-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const messageBox = document.getElementById('message-box');
    const payload = {
        name: document.getElementById('name').value,
        level: parseInt(document.getElementById('level').value)
    };

    try {
        const response = await fetch('/api/v1/new-class', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (response.ok) {
            messageBox.style.display = 'block';
            messageBox.style.backgroundColor = '#d4edda'; messageBox.style.color = '#155724';
            messageBox.innerText = '🎉 Class room created successfully!';
            setTimeout(() => { window.location.href = '/classes'; }, 1500);
        } else {
            throw new Error(data.detail || 'Failed to create class room record.');
        }
    } catch (error) {
        messageBox.style.display = 'block';
        messageBox.style.backgroundColor = '#f8d7da'; messageBox.style.color = '#721c24';
        messageBox.innerText = `❌ Error: ${error.message}`;
    }
});
</script>
{% endblock %}
