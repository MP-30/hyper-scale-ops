{% extends "base.html" %}
{% block title %}Add Teacher{% endblock %}

{% block content %}
<div class="card">
    <h2>➕ Onboard New Teacher</h2>
    <p class="text-muted">Register a new faculty member into the roster.</p>
    <div id="message-box" style="display: none; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-weight: bold;"></div>

    <form id="teacher-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label for="phone_number">Phone Number</label>
            <input type="text" id="phone_number" placeholder="e.g. +91 98765 43210" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label for="subject">Primary Department Subject</label>
            <input type="text" id="subject" placeholder="e.g. Mathematics, Physics" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <button type="submit" class="btn" style="margin-top: 20px;">Save Teacher</button>
    </form>
</div>

<script>
document.getElementById('teacher-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const messageBox = document.getElementById('message-box');
    const payload = {
        name: document.getElementById('name').value,
        phone_number: document.getElementById('phone_number').value,
        subject: document.getElementById('subject').value
    };

    try {
        const response = await fetch('/api/v1/teachers/new-teacher', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (response.ok) {
            messageBox.style.display = 'block';
            messageBox.style.backgroundColor = '#d4edda'; messageBox.style.color = '#155724';
            messageBox.innerText = '🎉 Teacher registered successfully!';
            setTimeout(() => { window.location.href = '/teachers'; }, 1500);
        } else {
            throw new Error(data.detail || 'Failed to onboard teacher.');
        }
    } catch (error) {
        messageBox.style.display = 'block';
        messageBox.style.backgroundColor = '#f8d7da'; messageBox.style.color = '#721c24';
        messageBox.innerText = `❌ Error: ${error.message}`;
    }
});
</script>
{% endblock %}
